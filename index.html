<div class="form-card" style="text-align: center;">
  <h3 style="margin: 0 0 10px 0; font-weight: 500;">琥珀・湯種生吐司</h3>
  <p style="margin: 0 0 25px 0; font-size: 0.9rem; color: #888;">請選擇預購數量，點擊後將直接開啟 LINE Pay 付款頁面</p>

  <label style="text-align: left;">請選擇購買數量</label>
  <select id="linePaySelect" onchange="updateLinePayLink()" style="margin-bottom: 25px;">
    <option value="你的1條LINE_PAY收款網址">1 條 (NT$ 250)</option>
    <option value="你的2條LINE_PAY收款網址">2 條 (NT$ 500)</option>
    <option value="你的3條LINE_PAY收款網址">3 條 (NT$ 750)</option>
    <option value="你的4條LINE_PAY收款網址">4 條 (NT$ 1000)</option>
  </select>

  <a id="linePayBtn" href="你的1條LINE_PAY收款網址" target="_top" style="display: block; background: #06C755; color: #fff; text-decoration: none; padding: 15px; border-radius: 4px; font-size: 1rem; font-weight: 500; letter-spacing: 1px;">
    使用 LINE Pay 線上預購
  </a>
</div>

<script>
  function updateLinePayLink() {
    var selectedUrl = document.getElementById('linePaySelect').value;
    document.getElementById('linePayBtn').href = selectedUrl;
  }
</script>
